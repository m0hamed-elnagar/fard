org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Suppress warnings about compileSdk/SDK version from Flutter's internal Gradle plugin
# These warnings are from Flutter framework code, not your app
# You don't control flutter.compileSdkVersion - Flutter manages it
android.suppressUnsupportedCompileSdkWarning=true
android.suppressUnsupportedSdkWarnings=true
